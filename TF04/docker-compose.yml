version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend1
      - backend2
      - backend3
      - frontend
      - admin
    networks:
      - ecommerce-net

  frontend:
    build:
      context: ./frontend
    container_name: ecommerce-frontend
    networks:
      - ecommerce-net

  admin:
    build:
      context: ./admin
    container_name: ecommerce-admin
    # Copia o dashboard.html para index.html automaticamente
    command: /bin/sh -c "cp /usr/share/nginx/html/dashboard.html /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"
    networks:
      - ecommerce-net

  backend1:
    build:
      context: ./backend
    container_name: ecommerce-backend1
    environment:
      - INSTANCE_ID=backend1
      - PORT=5000
    networks:
      - ecommerce-net

  backend2:
    build:
      context: ./backend
    container_name: ecommerce-backend2
    environment:
      - INSTANCE_ID=backend2
      - PORT=5000
      - DELAY_SIMULATION=0.2 # Simula leve lentidão para demonstrar balanceamento com resposta mais lenta, como segurido no form
    networks:
      - ecommerce-net

  backend3:
    build:
      context: ./backend
    container_name: ecommerce-backend3
    environment:
      - INSTANCE_ID=backend3
      - PORT=5000
      - SIMULATE_FAILURE=true # Ativa falhas esporádicas para health checks do nginx interceptarem se configurado p/ max_fails
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge
