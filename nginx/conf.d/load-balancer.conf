upstream backend_api {
    # Distribuição de carga usando algoritmo least_conn
    least_conn;

    # As 3 instâncias de backend com failover automático e health checks max_fails e fail_timeout
    server backend1:5000 max_fails=3 fail_timeout=30s;
    server backend2:5000 max_fails=3 fail_timeout=30s;
    server backend3:5000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name localhost;

    # Redireciona tudo de HTTP para HTTPS
    return 301 https://$host$request_uri;
}
