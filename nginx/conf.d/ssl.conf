server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Virtual Hosts paths configuration

    # Frontend (Root)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Backend
    location /api/ {
        # Rate limiting block for API
        limit_req zone=mylimit burst=20 nodelay;

        proxy_pass http://backend_api;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout configurations
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # Health check do backend (direto pro Nginx ou repassando)
    location /health {
        proxy_pass http://backend_api/health;
        proxy_set_header Host $host;
    }

    # Admin Panel
    location /admin/ {
        # Strip '/admin' off the request URL before passing to backend if necessary
        # but since admin is a static site serving on / inside its own container:
        rewrite ^/admin/(.*) /$1 break;
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        
        # Security: restrict to local IPs if in production, here we just allow all for the assignment
        allow all;
    }

    # Nginx Status (Monitoramento)
    location /nginx-status {
        stub_status on;
        access_log off;
        allow all;
    }
}
